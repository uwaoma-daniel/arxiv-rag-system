vector_store:
  type: qdrant
  qdrant_collection: arxiv_abstracts
  qdrant_url: ""
  qdrant_api_key: ""

embedding:
  model_name: sentence-transformers/all-MiniLM-L6-v2
  device: cpu
  batch_size: 32
  dimensions: 384

llm:
  mode: fallback
  fallback: google/flan-t5-base
  max_new_tokens: 200
  temperature: 0.1

api:
  host: 0.0.0.0
  port: 8000
  rate_limit: 10
  max_sessions: 50
  session_ttl_minutes: 30
  max_turns: 6

logging:
  level: INFO
  file: logs/rag_system.log
  max_bytes: 10485760
  backup_count: 3
